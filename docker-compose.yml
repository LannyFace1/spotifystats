version: "3.9"

services:
  # MongoDB database
  mongo:
    image: mongo:7-jammy
    container_name: myspotify_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    # MongoDB only accessible internally - never exposed to host
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Node.js backend
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: myspotify_server
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/myspotify
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - internal
    # Not exposed to host - accessed via nginx proxy

  # React frontend
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=/api   # Routed through nginx proxy
    container_name: myspotify_client
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - internal

  # Nginx reverse proxy - ONLY public-facing container
  nginx:
    image: nginx:1.25-alpine
    container_name: myspotify_nginx
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server
    networks:
      - internal

volumes:
  mongo_data:
    name: myspotify_mongo_data

networks:
  internal:
    driver: bridge
    name: myspotify_network
